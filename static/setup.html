<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公文自动排版工具 - 初始设置</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 550px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 10px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .welcome-text {
            background: #f0f9ff;
            border: 1px solid #bae6fd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
            color: #0369a1;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-label .optional {
            color: #999;
            font-weight: normal;
            font-size: 12px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-input::placeholder {
            color: #999;
        }

        .input-with-button {
            display: flex;
            gap: 8px;
        }

        .input-with-button .form-input {
            flex: 1;
        }

        .browse-btn {
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .browse-btn:hover {
            background: #5a6fd6;
        }

        .browse-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .form-hint {
            margin-top: 8px;
            font-size: 12px;
            color: #666;
        }

        .form-hint a {
            color: #667eea;
            text-decoration: none;
        }

        .form-hint a:hover {
            text-decoration: underline;
        }

        .default-path {
            background: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 10px 12px;
            margin-top: 8px;
            font-size: 12px;
            color: #555;
            word-break: break-all;
        }

        .default-path-label {
            color: #888;
            margin-right: 5px;
        }

        .path-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .use-default-btn {
            display: inline-block;
            padding: 6px 12px;
            background: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 12px;
            color: #555;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .use-default-btn:hover {
            background: #e0e0e0;
            border-color: #ccc;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            color: #991b1b;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 8px;
            padding: 12px;
            margin-top: 15px;
            color: #166534;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        .loading-spinner-small {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .section-divider {
            border-top: 1px solid #eee;
            margin: 25px 0;
            padding-top: 20px;
        }

        .section-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: "";
            display: inline-block;
            width: 3px;
            height: 14px;
            background: #667eea;
            margin-right: 8px;
            border-radius: 2px;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #999;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <div class="logo-icon">📄</div>
        </div>
        <h1>公文自动排版工具</h1>
        <p class="subtitle">首次使用设置</p>

        <div class="welcome-text">
            欢迎使用公文自动排版工具！<br><br>
            本工具使用大语言模型进行文档结构识别，需要配置 API Key 和服务地址才能使用。
        </div>

        <form id="setupForm">
            <div class="form-group">
                <label class="form-label" for="apiKey">API Key</label>
                <input
                    type="password"
                    class="form-input"
                    id="apiKey"
                    placeholder="请输入您的 API Key"
                    autocomplete="off"
                >
                <p class="form-hint">
                    请输入 OpenAI 兼容 API 的密钥
                </p>
            </div>

            <div class="form-group">
                <label class="form-label" for="baseUrl">API Base URL</label>
                <input
                    type="text"
                    class="form-input"
                    id="baseUrl"
                    placeholder="https://api-deap.dingtalk.com/v1"
                    value="https://api-deap.dingtalk.com/v1"
                    autocomplete="off"
                >
                <p class="form-hint">
                    OpenAI 兼容 API 的服务地址
                </p>
            </div>

            <div class="form-group">
                <label class="form-label" for="modelInput">选择模型</label>
                <input
                    type="text"
                    class="form-input"
                    id="modelInput"
                    list="modelList"
                    placeholder="输入或选择模型名称"
                    autocomplete="off"
                >
                <datalist id="modelList"></datalist>
                <p class="form-hint">
                    选择推荐模型或输入自定义模型名称，您可以随时在主页面右上角切换模型
                </p>
            </div>

            <div class="section-divider">
                <div class="section-title">数据存储设置</div>
            </div>

            <div class="form-group">
                <label class="form-label" for="dataDir">
                    数据存储位置 <span class="optional">（可选）</span>
                </label>
                <div class="input-with-button">
                    <input
                        type="text"
                        class="form-input"
                        id="dataDir"
                        placeholder="留空则使用默认位置"
                        autocomplete="off"
                    >
                    <button type="button" class="browse-btn" id="browseBtn">浏览...</button>
                </div>
                <p class="form-hint">
                    用于存储配置文件和临时文档，留空将使用默认位置
                </p>
                <div class="default-path" id="defaultPathDisplay">
                    <span class="default-path-label">默认位置：</span>
                    <span id="defaultPath">加载中...</span>
                </div>
                <div class="path-buttons">
                    <button type="button" class="use-default-btn" id="useDefaultBtn">
                        使用默认位置
                    </button>
                    <button type="button" class="use-default-btn" id="clearPathBtn">
                        清空
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" id="saveBtn">
                保存并开始使用
            </button>

            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>
        </form>

        <div class="footer">
            基于 GB/T 9704-2012 党政机关公文格式标准
        </div>
    </div>

    <script>
        const form = document.getElementById('setupForm');
        const apiKeyInput = document.getElementById('apiKey');
        const baseUrlInput = document.getElementById('baseUrl');
        const modelInput = document.getElementById('modelInput');
        const modelList = document.getElementById('modelList');
        const dataDirInput = document.getElementById('dataDir');
        const saveBtn = document.getElementById('saveBtn');
        const browseBtn = document.getElementById('browseBtn');
        const useDefaultBtn = document.getElementById('useDefaultBtn');
        const clearPathBtn = document.getElementById('clearPathBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const defaultPathSpan = document.getElementById('defaultPath');

        let defaultDataDir = '';

        // 加载推荐模型列表
        async function loadModels() {
            try {
                const response = await fetch('/api/models');
                const data = await response.json();

                if (data.success && data.suggested_models) {
                    modelList.innerHTML = '';
                    data.suggested_models.forEach(model => {
                        const option = document.createElement('option');
                        option.value = model.id;
                        option.textContent = `${model.name} - ${model.description}`;
                        modelList.appendChild(option);
                    });
                    // 设置当前模型为默认值
                    if (data.current_model) {
                        modelInput.value = data.current_model;
                    }
                }
            } catch (error) {
                console.error('加载模型列表失败:', error);
                modelInput.value = 'qwen3-max';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const apiKey = apiKeyInput.value.trim();
            const baseUrl = baseUrlInput.value.trim();
            const selectedModel = modelInput.value.trim();
            const dataDir = dataDirInput.value.trim();

            if (!apiKey) {
                showError('请输入 API Key');
                return;
            }

            if (apiKey.length < 10) {
                showError('API Key 格式不正确');
                return;
            }

            if (!selectedModel) {
                showError('请输入或选择一个模型');
                return;
            }

            saveBtn.disabled = true;
            saveBtn.innerHTML = '<span class="loading-spinner"></span>正在保存...';
            hideMessages();

            try {
                // 先保存 API Key、Base URL 和数据目录
                const configRequestBody = { api_key: apiKey };
                if (baseUrl) {
                    configRequestBody.base_url = baseUrl;
                }
                if (dataDir) {
                    configRequestBody.data_dir = dataDir;
                }

                const configResponse = await fetch('/api/config/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(configRequestBody)
                });

                const configData = await configResponse.json();

                if (!configData.success) {
                    showError(configData.message || '保存配置失败，请重试');
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '保存并开始使用';
                    return;
                }

                // 然后保存模型设置
                const modelResponse = await fetch('/api/models/set', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ model: selectedModel })
                });

                const modelData = await modelResponse.json();

                if (modelData.success) {
                    showSuccess('配置保存成功！正在跳转...');
                    setTimeout(() => {
                        window.location.href = '/static/index.html';
                    }, 1500);
                } else {
                    showError(modelData.message || '保存模型设置失败，请重试');
                    saveBtn.disabled = false;
                    saveBtn.innerHTML = '保存并开始使用';
                }
            } catch (error) {
                showError('网络错误，请检查网络连接');
                saveBtn.disabled = false;
                saveBtn.innerHTML = '保存并开始使用';
            }
        });

        // 点击"浏览"按钮打开文件夹选择对话框
        browseBtn.addEventListener('click', async () => {
            browseBtn.disabled = true;
            browseBtn.innerHTML = '<span class="loading-spinner-small"></span>选择中...';
            hideMessages();

            try {
                const response = await fetch('/api/config/browse-folder');
                const data = await response.json();

                if (data.success && data.path) {
                    dataDirInput.value = data.path;
                } else if (data.message && data.message !== '未选择文件夹') {
                    showError(data.message);
                }
            } catch (error) {
                showError('打开文件夹选择器失败');
            } finally {
                browseBtn.disabled = false;
                browseBtn.innerHTML = '浏览...';
            }
        });

        // 点击"使用默认位置"按钮
        useDefaultBtn.addEventListener('click', () => {
            dataDirInput.value = defaultDataDir;
        });

        // 点击"清空"按钮
        clearPathBtn.addEventListener('click', () => {
            dataDirInput.value = '';
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            successMsg.classList.remove('show');
        }

        function showSuccess(message) {
            successMsg.textContent = message;
            successMsg.classList.add('show');
            errorMsg.classList.remove('show');
        }

        function hideMessages() {
            errorMsg.classList.remove('show');
            successMsg.classList.remove('show');
        }

        // 页面加载时检查配置状态并获取默认路径
        async function checkConfig() {
            try {
                const response = await fetch('/api/config/status');
                const data = await response.json();

                // 更新默认路径显示
                if (data.default_data_dir) {
                    defaultDataDir = data.default_data_dir;
                    defaultPathSpan.textContent = data.default_data_dir;
                } else {
                    defaultPathSpan.textContent = '(无法获取)';
                }

                // 如果已配置数据目录，显示当前配置
                if (data.data_dir && data.data_dir !== data.default_data_dir) {
                    dataDirInput.value = data.data_dir;
                }

                if (data.configured) {
                    // 已配置，跳转到主页面
                    window.location.href = '/static/index.html';
                }
            } catch (error) {
                console.log('检查配置状态失败');
                defaultPathSpan.textContent = '(无法获取)';
            }

            // 加载模型列表
            loadModels();
        }

        // 页面加载时检查
        checkConfig();
    </script>
</body>
</html>
